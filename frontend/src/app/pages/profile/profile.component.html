<div class="profile-page">


  <div
  class="profile-card"
  *ngIf="user">


    <div class="avatar-section">


      <img
      class="avatar"
      [src]="avatarUrl"
      (error)="avatarError=true">



      <label class="file-upload">

        📸 Changer photo

        <input
        type="file"
        accept="image/*"
        (change)="onFileSelected($event)">

      </label>



      <button
      *ngIf="selectedFile"
      (click)="uploadPhoto()">

        Enregistrer la photo

      </button>



    </div>





    <div class="user-info">


      <h2>
        {{user.name}}
      </h2>


      <p>
        {{user.email}}
      </p>


    </div>



  </div>







  <div class="section">


    <h3>
      🎬 Vos favoris
    </h3>



    <div
    class="favorites-grid"
    *ngIf="favorites.length>0;else empty">


      <div
      class="favorite-card"
      *ngFor="let film of favorites">



        <img
        [src]="
        'https://image.tmdb.org/t/p/w300'
        + film.poster_path">



        <div class="fav-title">

          {{film.title}}

        </div>



        <button
        (click)="removeFavorite(film.tmdb_id)">

          Supprimer

        </button>



      </div>


    </div>





    <ng-template #empty>

      <p class="empty">

        Aucun favori

      </p>


    </ng-template>


  </div>







  <div class="section">


    <h3>
      🔐 Sécurité du compte
    </h3>



    <div class="password-card">


      <input
      [(ngModel)]="newPassword"
      type="password"
      placeholder="Nouveau mot de passe">



      <button
      (click)="updatePassword()"
      [disabled]="newPassword.length<6">

        Mettre à jour

      </button>



      <p
      class="success"
      *ngIf="passwordSuccess">

        ✔ Mot de passe mis à jour

      </p>


    </div>


  </div>



</div>
