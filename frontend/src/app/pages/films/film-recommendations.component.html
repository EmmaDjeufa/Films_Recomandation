<h2>🎬 Films</h2>

<div class="filters">
  <button (click)="loadPopular()" [class.active]="activeCategory === 'popular'">
    Populaires
  </button>

  <button (click)="loadTopRated()" [class.active]="activeCategory === 'top'">
    Top
  </button>

  <button (click)="loadUpcoming()" [class.active]="activeCategory === 'upcoming'">
    À venir
  </button>
</div>

<!-- EMPTY (SEULEMENT SI PAS LOADING) -->
<div class="empty" *ngIf="!loading && films.length === 0">
  🎬 Aucun film trouvé
</div>

<!-- GRID -->
<div class="grid" *ngIf="films.length > 0">

  <div class="card" *ngFor="let film of films">

    <div class="poster">
      <img [src]="'https://image.tmdb.org/t/p/w500' + film.poster_path">

      <button class="favorite" (click)="addFavorite(film)">
        ❤️
      </button>
    </div>

    <div class="content">
      <h3>{{ film.title }}</h3>
      <p>{{ film.overview }}</p>

      <div class="bottom">
        <span>⭐ {{ film.vote_average || 'N/A' }}</span>

        <button class="watch-btn">
          ▶ Regarder
        </button>
      </div>
    </div>

  </div>

</div>
