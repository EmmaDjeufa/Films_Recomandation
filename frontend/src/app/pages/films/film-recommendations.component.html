<h2>🎬 Films</h2>

<div class="filters">
  <button (click)="loadPopular()">Populaires</button>
  <button (click)="loadTopRated()">Top</button>
  <button (click)="loadUpcoming()">À venir</button>
</div>

<div class="grid">
  <div class="card" *ngFor="let film of films">

    <img [src]="'https://image.tmdb.org/t/p/w500' + film.poster_path">

    <h3>{{ film.title }}</h3>

    <p>{{ film.overview }}</p>

    <button (click)="addFavorite(film)">
      ❤️ Favori
    </button>

  </div>
</div>
