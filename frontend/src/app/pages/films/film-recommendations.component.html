<section class="films-page">


  <header class="hero">

    <h1>
      🎬 ReckOMovies
    </h1>

    <p>
      Les films populaires, les nouveautés et les meilleurs classements.
    </p>

  </header>




  <div class="filters">


    <button
      (click)="loadPopular()"
      [class.active]="activeCategory === 'popular'">

      🔥 Populaires

    </button>



    <button
      (click)="loadTopRated()"
      [class.active]="activeCategory === 'top'">

      ⭐ Mieux notés

    </button>



    <button
      (click)="loadUpcoming()"
      [class.active]="activeCategory === 'upcoming'">

      🚀 À venir

    </button>


  </div>





  <div
  class="loading-container"
  *ngIf="loading">


    <div class="spinner"></div>

    <p>
      Chargement...
    </p>


  </div>





  <div
  class="empty"
  *ngIf="!loading && films.length === 0">


    Aucun film trouvé


  </div>





  <div
  class="movies-grid"
  *ngIf="!loading && films.length > 0">



    <article
    class="movie-card"
    *ngFor="let film of films">



      <div class="poster">


        <img
        [src]="'https://image.tmdb.org/t/p/w500' + film.poster_path"
        [alt]="film.title">



        <button
          class="favorite"
          [class.active]="isFavorite(film)"
          (click)="addFavorite(film)">

          <span>
            ♥
          </span>

        </button>



        <span class="rating">

          ⭐ {{film.vote_average || 'N/A'}}

        </span>



      </div>





      <div class="movie-info">


        <h2>

          {{film.title}}

        </h2>



        <p>

          {{film.overview}}

        </p>


      </div>



    </article>


  </div>


</section>
