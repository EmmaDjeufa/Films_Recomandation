<!-- users-list.component.html  -->
<div class="users-container">



<h2>
👥 Découvrir des utilisateurs
</h2>




<div
class="loading"
*ngIf="loading">

Chargement des utilisateurs...

</div>





<div
class="users-grid"

*ngIf="!loading && users.length>0">





<div
class="user-card"

*ngFor="let user of users">





<img

class="avatar"

[src]="user.photo_url || 'images/default.png'"

>






<div class="content">



<div class="header">


<h3>
{{user.name}}
</h3>



<span
class="verified"

*ngIf="user.is_verified">

✔ Vérifié

</span>


</div>





<p class="email">

📧 {{user.email}}

</p>






<div
class="themes"

*ngIf="user.themes?.length">


<span
class="theme"

*ngFor="let theme of user.themes">


🎬 {{theme}}


</span>


</div>






<p>

⭐ {{user.common_themes || 0}}
thème(s) en commun

</p>






<button
[routerLink]="['/users',user.id]">

Voir le profil

</button>



</div>



</div>



</div>







<div

class="empty"

*ngIf="!loading && users.length===0">


Aucun utilisateur trouvé.


</div>



</div>
