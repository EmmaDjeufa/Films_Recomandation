<!-- users-list.component.html  -->
<div class="users-container">

    <h2>👥 Découvrir des utilisateurs</h2>

    <div class="search-box">
        <input
            type="text"
            placeholder="🔍 Rechercher un utilisateur..."
            [(ngModel)]="search"
            (input)="filterUsers()">
    </div>

    <div class="loading" *ngIf="loading">
        Chargement...
    </div>

    <div
        class="users-grid"
        *ngIf="!loading && filteredUsers.length">

        <article
            class="user-card"
            *ngFor="let user of filteredUsers">

            <img
                class="avatar"
                [src]="user.photo_url || 'images/default.png'"
                [alt]="user.name">

            <div class="content">

                <div class="header">

                    <h3>{{user.name}}</h3>

                    <span
                       
                      class="me"
                      *ngIf="user.id === currentUserId">

                      ⭐ Vous

                    </span>

                </div>

                <p class="email">
                    📧 {{user.email}}
                </p>

                <div class="stats">

                    <span class="score">
                        🏆 {{user.cinema_score || 0}}
                    </span>

                    <span
                        class="verified"
                        *ngIf="user.is_verified">

                        ✔ Vérifié

                    </span>

                </div>

                <div
                    class="themes"
                    *ngIf="user.themes?.length">

                    

                </div>

                <div 
                  class="common-themes"
                  *ngIf="user.common_themes > 0">


                  ⭐

                  <strong>
                    {{user.common_themes}}
                  </strong>

                  thème(s) en commun


                  </div>


                  <div
                    class="common-themes empty-common"
                    *ngIf="!user.common_themes">

                    Aucun thème commun

                  </div>

                <button
                    (click)="openProfile(user)">

                    {{ user.id === currentUserId
                        ? 'Mon profil'
                        : 'Voir le profil' }}

                </button>

            </div>

        </article>

    </div>

    <div
        class="empty"
        *ngIf="!loading && !filteredUsers.length">

        Aucun utilisateur trouvé.

    </div>

</div>
