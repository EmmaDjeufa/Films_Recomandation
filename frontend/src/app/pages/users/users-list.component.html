<!-- users-list.component.html  -->
<div class="users-container">



<h2>
👥 Découvrir des utilisateurs
</h2>


<div class="search-box">

  <input
    type="text"
    placeholder="🔍 Rechercher un utilisateur..."
    [(ngModel)]="search"
    (input)="filterUsers()">

</div>

<div
class="loading"
*ngIf="loading">

Chargement des utilisateurs...

</div>





<div
class="users-grid"

*ngIf="!loading && filteredUsers.length>0">





<div
class="user-card"

*ngFor="let user of filteredUsers">





<img

class="avatar"

[src]="user.photo_url || 'images/default.png'"

>






<div class="content">



<div class="header">


<h3>
{{user.name}}
</h3>



<span
class="verified"

*ngIf="user.is_verified">

✔ Vérifié

</span>

<span
class="me"
*ngIf="user.id === currentUserId">

⭐ Votre profil

</span>

</div>





<p class="email">

📧 {{user.email}}

</p>






<div
class="themes"

*ngIf="user.themes?.length">


<span
class="theme"

*ngFor="let theme of user.themes">


🎬 {{theme}}


</span>


</div>






<p class="common-themes">

⭐ {{user.common_themes || 0}}
thème(s) en commun

</p>






<button
(click)="openProfile(user)">

{{ user.id === currentUserId 
 ? 'Mon profil'
 : 'Voir le profil'
}}

</button>



</div>



</div>



</div>







<div

class="empty"

*ngIf="!loading && filteredUsers.length===0">


Aucun utilisateur trouvé.


</div>



</div>
